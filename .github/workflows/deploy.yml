name: CI/CD to EC2 (Java App, K8s, SHA tagging)

on:
  push:
    branches:
      - main     # change if your default branch is different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker image (SHA + latest)
      - name: Build Docker image (SHA + latest)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/java-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/java-app:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/java-app:latest

      # 4️⃣ Push both tags
      - name: Push Docker image (SHA + latest)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/java-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/java-app:latest

      # 5️⃣ SSH to EC2 and deploy to Minikube
      - name: Deploy to EC2 Minikube (update image to SHA, rollout)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo " Using Minikube context"
            kubectl config use-context minikube || true

            echo " Deploying using Helm"
            cd ~/java-app/java-app-chart

            helm upgrade --install java-app-release . \
              --set image.repository=${{ secrets.DOCKER_USERNAME }}/java-app \
              --set image.tag=${{ github.sha }}
