name: CI/CD to EC2 (Java App, K8s, Helm)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/java-app:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/java-app:${{ github.sha }} \
                   ${{ secrets.DOCKER_USERNAME }}/java-app:latest

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/java-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/java-app:latest

    - name: Deploy to EC2 using Helm
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          echo "Using Minikube context"
          kubectl config use-context minikube || true

          echo "Deploying using Helm"
          cd ~/java-app/java-app-chart

          helm upgrade --install java-app-release . \
            --set image.repository=${{ secrets.DOCKER_USERNAME }}/java-app \
            --set image.tag=${{ github.sha }}

          echo "Done"